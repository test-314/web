<!DOCTYPE html>
<html>
<head>
  <title>Scholarship Result 2025 - CHHATAK-1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Junior Scholarship Result 2025</h1>
  <p>Center: 477 - CHHATAK-1</p>

  <div class="search-box">
    <input type="number" id="roll" placeholder="Enter Roll Number">
    <button onclick="checkResult()">Check Result</button>
  </div>

  <div id="loading" class="loading">Checking Result...</div>
  <div id="result" class="result-card"></div>
</div>

<script>
let resultsData = [];

fetch('results.json')
  .then(res => res.json())
  .then(data => {
    resultsData = data;
  });

function checkResult() {
  const roll = document.getElementById("roll").value.trim();
  const resultBox = document.getElementById("result");
  const loading = document.getElementById("loading");

  resultBox.innerHTML = "";
  loading.style.display = "block";

  setTimeout(() => {
    loading.style.display = "none";

    const student = resultsData.find(s => s.roll === roll);

    if (student) {
      resultBox.innerHTML = `
        <h2>${student.name}</h2>
        <p><strong>Roll:</strong> ${student.roll}</p>
        <p><strong>Institution:</strong> ${student.institution}</p>
        <p><strong>Category:</strong> 
          <span class="${student.categoryClass}">
            ${student.category}
          </span>
        </p>
      `;
    } else {
      resultBox.innerHTML = `
        <h2 class="fail">Result Not Found</h2>
        <p>This roll did not receive scholarship.</p>
      `;
    }

  }, 1000);
}
</script>

</body>
</html>
