<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scholarship Result 2025 - CHHATAK-1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Junior Scholarship Result 2025</h1>
  <p>Center: 477 - CHHATAK-1</p>

  <div class="search-box">
    <input type="number" id="roll" placeholder="Enter Roll Number">
    <button onclick="checkResult()">Check Result</button>
  </div>

  <div id="loading" class="loading">Checking Result...</div>
  <div id="result" class="result-card"></div>

  <footer class="footer">
    © Developed by <strong>Md Amir Hamza</strong><br>
    Data Source: Board of Intermediate & Secondary Education, Sylhet
  </footer>
</div>

<script>
let resultsData = [];

// Load JSON safely
fetch('results.json')
  .then(res => {
    if (!res.ok) throw new Error("Failed to load results.json");
    return res.json();
  })
  .then(data => {
    if (Array.isArray(data)) {
      resultsData = data;
    } else {
      throw new Error("JSON format invalid");
    }
  })
  .catch(error => {
    console.error("Error loading results:", error);
    alert("Result data failed to load. Check JSON file.");
  });

function checkResult() {
  const roll = document.getElementById("roll").value.trim();
  const resultBox = document.getElementById("result");
  const loading = document.getElementById("loading");

  resultBox.innerHTML = "";

  if (!roll) {
    alert("Please enter roll number");
    return;
  }

  loading.style.display = "block";

  setTimeout(() => {
    loading.style.display = "none";

    const student = resultsData.find(
      s => String(s.roll) === String(roll)
    );

    if (student) {

      let message = "";

      // 🎉 Congratulations message
      if (student.category !== "None") {
        message = `<p class="congrats">🎉 Congratulations! You have been awarded a scholarship.</p>`;
      }

      resultBox.innerHTML = `
        ${message}
        <h2>${student.name}</h2>
        <p><strong>Roll:</strong> ${student.roll}</p>
        <p><strong>Institution:</strong> ${student.institution}</p>
        <p><strong>Category:</strong>
          <span class="${student.categoryClass || 'General'}">
            ${student.category}
          </span>
        </p>
      `;
    } else {
      resultBox.innerHTML = `
        <h2 class="fail">Result Not Found</h2>
        <p>This roll did not receive scholarship.</p>
      `;
    }
  }, 600);
}
</script>

</body>
</html>
