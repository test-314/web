<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC 2028 | Home</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container center">

  <h1>SSC 2028</h1>
  <p class="subtitle">Study Dashboard</p>

  <!-- ⏳ Countdown -->
  <div class="countdown-card">
    <div class="countdown-title">Half Yearly Exam</div>

    <div class="countdown-grid">
      <div class="time-box">
        <span id="days">0</span>
        <small>Days</small>
      </div>
      <div class="time-box">
        <span id="hours">0</span>
        <small>Hours</small>
      </div>
      <div class="time-box">
        <span id="minutes">0</span>
        <small>Minutes</small>
      </div>
      <div class="time-box">
        <span id="seconds">0</span>
        <small>Seconds</small>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav">
    <a href="routine.html">📅 Class Routine</a>
    <a href="experiment.html">🧪 Experiments</a>
  </div>

</div>

<div class="footer">
  © <span>TEAM SCIENCE • SSC 2028</span><br>
  Developed by Md Amir Hamza
</div>

<script>
// ===== COUNTDOWN =====
const examDate = new Date("2026-06-28T00:00:00").getTime();

function updateCountdown(){
  const now = new Date().getTime();
  const diff = examDate - now;

  if(diff <= 0){
    document.querySelector(".countdown-grid").innerHTML = "🚀 Exam Started";
    return;
  }

  document.getElementById("days").innerText =
    Math.floor(diff / (1000*60*60*24));

  document.getElementById("hours").innerText =
    Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

  document.getElementById("minutes").innerText =
    Math.floor((diff % (1000*60*60)) / (1000*60));

  document.getElementById("seconds").innerText =
    Math.floor((diff % (1000*60)) / 1000);
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
